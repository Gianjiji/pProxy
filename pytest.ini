[pytest]
# I test vivono in 'tests/'. 'pythonpath = .' aggiunge la radice del progetto a
# sys.path così che i test possano importare i moduli di primo livello
# (pProxy, privacy_proxy, webapp.*) anche se si trovano in una sottocartella.
# 'python_files = test*.py' intercetta sia 'testPProxy.py' (nome storico, senza
# underscore) sia i file 'test_*.py'.
testpaths = tests
pythonpath = .
python_files = test*.py
python_classes = Test*
python_functions = test_*
# Silenzia un avviso di deprecazione di terze parti, non risolvibile nel nostro
# codice: fastapi.testclient usa httpx con starlette.testclient. Filtro mirato
# (solo questo messaggio) per non nascondere altre deprecazioni reali.
filterwarnings =
    ignore:Using `httpx` with `starlette.testclient` is deprecated:UserWarning
